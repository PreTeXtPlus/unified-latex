name: Publish Pretextbook Package

on:
  push:
    tags:
      - "pretextbook-unified-latex-to-pretext-v*"
  workflow_dispatch:


permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6


      - name: Verify tag commit is on pretextbook
        run: |
          git fetch --no-tags origin pretextbook:refs/remotes/origin/pretextbook
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/pretextbook"; then
            echo "Tag commit is not on origin/pretextbook."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Build package
        run: npm run build -w packages/unified-latex-to-pretext

      - name: Generate distributable package.json files
        run: npm run package -w packages/unified-latex-to-pretext

      - name: Publish to npm
        run: npm run publish -w packages/unified-latex-to-pretext
