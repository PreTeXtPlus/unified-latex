<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unified-latex-to-pretext - Converter Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .container {
            flex: 1;
            display: flex;
            overflow: hidden;
            padding: 15px;
            gap: 15px;
        }

        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .editor-panel h2 {
            background: #f8f9fa;
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #e9ecef;
        }

        textarea {
            flex: 1;
            padding: 15px;
            border: none;
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            font-size: 13px;
            resize: none;
            outline: none;
            color: #333;
            background: white;
        }

        textarea::placeholder {
            color: #999;
        }

        .input-panel textarea {
            border-right: 1px solid #e9ecef;
        }

        .output-panel {
            position: relative;
        }

        .output-panel textarea {
            background: #f9fafb;
            color: #555;
        }

        .status {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            max-width: 200px;
            text-align: right;
            word-break: break-word;
            z-index: 10;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.processing {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .controls {
            position: absolute;
            bottom: 15px;
            right: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            z-index: 10;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
            color: #667eea;
            border: 1px solid #667eea;
        }

        button:hover {
            background: #667eea;
            color: white;
        }

        button.primary {
            background: #667eea;
            color: white;
        }

        button.primary:hover {
            background: #5568d3;
        }

        .error-details {
            background: #fff5f5;
            border-left: 4px solid #fc8181;
            padding: 12px 15px;
            font-size: 12px;
            color: #c53030;
            max-height: 100px;
            overflow-y: auto;
            font-family: "Monaco", "Menlo", "Ubuntu Mono", monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            header h1 {
                font-size: 18px;
            }
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: -1px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <header>
        <h1>unified-latex-to-pretext Converter</h1>
        <p>Real-time LaTeX to PreTeXt conversion</p>
    </header>

    <div class="container">
        <div class="editor-panel input-panel">
            <h2>LaTeX Input</h2>
            <textarea id="input" placeholder="Enter LaTeX code here...&#10;&#10;Example:&#10;&#10;\documentclass{article}&#10;\usepackage{amsmath}&#10;&#10;\begin{document}&#10;&#10;\section{Introduction}&#10;This is some \textbf{bold} text.&#10;&#10;\begin{equation}&#10;E = mc^2&#10;\end{equation}&#10;&#10;\end{document}"></textarea>
        </div>

        <div class="editor-panel output-panel">
            <h2>PreTeXt Output</h2>
            <div id="status" class="status processing" style="display: none;">
                <span class="spinner"></span>Processing...
            </div>
            <textarea id="output" placeholder="Conversion output will appear here..." readonly></textarea>
            <div id="error" class="error-details" style="display: none;"></div>
            <div class="controls">
                <button class="primary" id="convert-btn">Convert</button>
                <button id="copy-btn">Copy Output</button>
                <button id="clear-btn">Clear All</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { processLatexToAstViaUnified } from '@unified-latex/unified-latex';
        import { convertToPretext } from '@unified-latex/unified-latex-to-pretext';

        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const statusEl = document.getElementById('status');
        const errorEl = document.getElementById('error');
        const convertBtn = document.getElementById('convert-btn');
        const copyBtn = document.getElementById('copy-btn');
        const clearBtn = document.getElementById('clear-btn');
        const latexToAst = processLatexToAstViaUnified();

        async function convert(latex) {
            try {
                statusEl.style.display = 'block';
                statusEl.className = 'status processing';
                statusEl.innerHTML = '<span class="spinner"></span>Processing...';
                errorEl.style.display = 'none';
                convertBtn.disabled = true;
                convertBtn.textContent = 'Converting...';

                const ast = latexToAst.processSync(latex).result;
                const xml = convertToPretext(ast);
                
                outputEl.value = xml;
                
                statusEl.className = 'status success';
                statusEl.textContent = '✓ Conversion successful';
                setTimeout(() => {
                    statusEl.style.display = 'none';
                }, 3000);
            } catch (error) {
                errorEl.style.display = 'block';
                errorEl.textContent = error.message || String(error);
                statusEl.className = 'status error';
                statusEl.textContent = '✗ Conversion failed';
                outputEl.value = '';
                console.error('Conversion error:', error);
            } finally {
                convertBtn.disabled = false;
                convertBtn.textContent = 'Convert';
            }
        }

        // Debounce live conversion while typing.
        let timeout;
        inputEl.addEventListener('input', () => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                convert(inputEl.value);
            }, 500);
        });

        convertBtn.addEventListener('click', () => convert(inputEl.value));

        // Copy to clipboard
        copyBtn.addEventListener('click', () => {
            if (outputEl.value) {
                navigator.clipboard.writeText(outputEl.value)
                    .then(() => {
                        const original = copyBtn.textContent;
                        copyBtn.textContent = '✓ Copied!';
                        setTimeout(() => {
                            copyBtn.textContent = original;
                        }, 2000);
                    })
                    .catch(err => console.error('Failed to copy:', err));
            }
        });

        // Clear all
        clearBtn.addEventListener('click', () => {
            inputEl.value = '';
            outputEl.value = '';
            errorEl.style.display = 'none';
            statusEl.style.display = 'none';
            inputEl.focus();
        });

        // Load sample on first load
        const sample = `\\documentclass{article}
\\usepackage{amsmath}

\\begin{document}

\\section{Introduction}

This is some \\textbf{bold} text and \\textit{italic} text.

\\subsection{Mathematics}

The quadratic formula is:
\\begin{equation}
x = \\frac{-b \\pm \\sqrt{b^2 - 4ac}}{2a}
\\end{equation}

\\end{document}`;

        inputEl.value = sample;
        convert(sample);
    </script>
</body>
</html>
